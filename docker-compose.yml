services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: constitution
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d constitution"]
      interval: 5s
      timeout: 5s
      retries: 5

  rag:
    build: ./rag
    environment:
      MISTRAL_API_KEY: "${MISTRAL_API_KEY}"
      CHROMA_DIR: "/data/chroma"
      EMBED_MODEL: "BAAI/bge-base-en-v1.5"
      MISTRAL_MODEL: "${MISTRAL_MODEL:-mistral-small-latest}"
      MISTRAL_TIMEOUT: "90"
      TOP_K_SEMANTIC: "6"
      TOP_K_BM25: "6"
      TOP_K_FINAL: "4"
    volumes:
      - ragdata:/data          # persists PDF + ChromaDB — ingestion only runs once
    ports:
      - "8000:8000"            # optional: expose for debugging; remove in prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s       # first boot: PDF download + embedding takes time

  backend:
    build: ./backend
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/constitution?schema=public"
      PORT: 3000
      RAG_URL: "http://rag:8000"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      rag:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend/angular-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  ragdata:
